<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Bober-Bank(тест)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Основні стилі твого бобрового стилю */
        body { font-family: 'Arial', sans-serif; background-color: #1e1e24; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background 0.5s; }
        .container { background-color: #2a2a35; padding: 30px; border-radius: 12px; width: 350px; margin: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .hidden { display: none !important; }
        button { background: #ff9f1c; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e08b14; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #3f3f50; color: #fff; box-sizing: border-box; }
        
        /* Чат */
        .chat-window { height: 250px; overflow-y: auto; background: #15151a; padding: 10px; border-radius: 6px; border: 2px solid #ff9f1c; margin-bottom: 10px; text-align: left; }
        .chat-message { margin-bottom: 8px; border-bottom: 1px solid #333; padding: 5px; }
        .chat-image { max-width: 100%; border-radius: 6px; margin-top: 5px; }
        
        /* Бас-режим */
        .bass-mode { animation: bass-bounce 0.2s infinite; }
        @keyframes bass-bounce { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>🦫 Bober-Bank</h1>
    </header>

    <div id="auth-sec" class="container">
        <h2>Вхід у Бобер-Банк</h2>
        <input type="text" id="username" placeholder="Твій бобро-нік">
        <input type="password" id="password" placeholder="Таємний пароль">
        <button onclick="login()">Увійти в хату</button>
    </div>

    <div id="chat-sec" class="container hidden bank-section">
        <h2>💬 Бобро-Чат</h2>
        <div id="chat-window" class="chat-window"></div>
        <input type="text" id="chat-input" placeholder="Що там у лісі?">
        <button onclick="sendMessage()">Написати</button>
    </div>

    <script>
        const SUPABASE_URL = "ТВІЙ_URL";
        const SUPABASE_KEY = "ТВІЙ_KEY";
        const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentGlobalUser = "";

        // Основна функція навігації
        function showSection(sectionId) {
            document.querySelectorAll('.bank-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');
            
            if(sectionId === 'chat-sec') loadChat();
            if(sectionId === 'shop-sec') startBassMode();
            else stopBassMode();
        }

        async function sendMessage() {
            const text = document.getElementById('chat-input').value;
            if(!text) return;
            await mySupabase.from('bober_chat').insert([{ login: currentGlobalUser, message: text }]);
            document.getElementById('chat-input').value = '';
            loadChat();
        }

        async function loadChat() {
            const { data } = await mySupabase.from('bober_chat').select('*').order('created_at', { ascending: false }).limit(10);
            document.getElementById('chat-window').innerHTML = data.reverse().map(m => `
                <div class="chat-message"><b>${m.login}:</b> ${m.message}</div>
            `).join('');
        }

        function startBassMode() {
            document.body.classList.add('bass-mode');
            const audio = new Audio('music.mp4');
            audio.loop = true;
            audio.play();
        }

        function stopBassMode() { document.body.classList.remove('bass-mode'); }

        async function login() {
            currentGlobalUser = document.getElementById('username').value;
            alert("Ласкаво просимо, " + currentGlobalUser + "! Йди рубай ліс!");
            document.getElementById('auth-sec').classList.add('hidden');
            // Показуємо інші секції...
        }
    </script>
</body>
</html>
