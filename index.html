<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOBER-BANK — Офіційний сайт</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        header {
            background-color: #ff9f1c;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        header h1 { margin: 0; color: #1e1e24; font-size: 2.5rem; }
        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            width: 350px;
            text-align: center;
            margin: 20px 0;
        }
        .hidden { display: none; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #3f3f50;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ff9f1c;
            border: none;
            border-radius: 6px;
            color: #1e1e24;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #e08b14; }
        .switch-link { margin-top: 15px; font-size: 0.9rem; color: #ff9f1c; cursor: pointer; text-decoration: underline; }
        .bank-image { width: 100%; max-width: 280px; border-radius: 8px; margin-bottom: 15px; border: 3px solid #ff9f1c; }
        .loader { border: 6px solid #3f3f50; border-top: 6px solid #ff9f1c; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-message { font-weight: bold; font-size: 1.1rem; color: #ff4d4d; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <h1>🦫 BOBER-BANK</h1>
    </header>

    <div id="register-box" class="container">
        <h2>Реєстрація у Бобер-Банку</h2>
        <input type="text" id="reg-login" placeholder="Придумайте логін" required>
        <input type="password" id="reg-password" placeholder="Придумайте пароль" required>
        <button onclick="registerUser()">Зареєструватися</button>
        <div class="switch-link" onclick="toggleForms('login')">Вже є акаунт? Увійти</div>
    </div>

    <div id="login-box" class="container hidden">
        <h2>Вхід в систему</h2>
        <input type="text" id="login-username" placeholder="Логін">
        <input type="password" id="login-password" placeholder="Пароль">
        <button onclick="loginUser()">Увійти</button>
        <div class="switch-link" onclick="toggleForms('register')">Назад до реєстрації</div>
    </div>

    <div id="main-bank" class="container hidden">
        <h2>Вітаємо, <span id="user-display">Користувач</span>! 👋</h2>
        <p>Ваш баланс: 0.00 ₴</p>
        
        <img src="beaver.jpeg" alt="Преміальний Бобер" class="bank-image">
        
        <button id="buy-btn" onclick="startLoading()">Оформити VIP-картку "Бобер"</button>

        <div id="loading-section" class="hidden">
            <div class="loader"></div>
            <p>Обробка транзакції банком... Зачекайте 10 секунд</p>
        </div>

        <div id="status-message"></div>
    </div>

    <script>
        // Ініціалізація вашого Supabase проєкту
        const SUPABASE_URL = "https://nvwkbgknvxfxvnhkcxnd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_csnhsX6JOzkZqKwFePoXiw_2ZqGbn6m";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Перемикач вікон
        function toggleForms(target) {
            if (target === 'login') {
                document.getElementById('register-box').classList.add('hidden');
                document.getElementById('login-box').classList.remove('hidden');
            } else {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('register-box').classList.remove('hidden');
            }
        }

        // РЕЄСТРАЦІЯ (Вставка в таблицю passcodes)
        async function registerUser() {
            const loginInput = document.getElementById('reg-login').value.trim();
            const passInput = document.getElementById('reg-password').value.trim();

            if (!loginInput || !passInput) {
                alert("Заповни всі поля!");
                return;
            }

            // Відправляємо дані в Supabase
            const { data, error } = await supabase
                .from('passcodes')
                .insert([{ login: loginInput, password: passInput }]);

            if (error) {
                alert("Помилка бази даних: " + error.message);
            } else {
                alert("Реєстрація успішна! Тепер увійдіть.");
                toggleForms('login');
            }
        }

        // ВХІД (Пошук логіна і пароля)
        async function loginUser() {
            const loginIn = document.getElementById('login-username').value.trim();
            const passIn = document.getElementById('login-password').value.trim();

            // Перевіряємо збіг у базі даних
            const { data, error } = await supabase
                .from('passcodes')
                .select('*')
                .eq('login', loginIn)
                .eq('password', passIn);

            if (error) {
                alert("Помилка підключення: " + error.message);
                return;
            }

            if (data && data.length > 0) {
                alert("Вхід успішний!");
                document.getElementById('user-display').innerText = loginIn;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('main-bank').classList.remove('hidden');
            } else {
                alert("Неправильний логін або пароль! Спробуй ще раз.");
            }
        }

        // 10-секундний таймер-тролінг
        function startLoading() {
            document.getElementById('buy-btn').classList.add('hidden');
            document.getElementById('loading-section').classList.remove('hidden');
            document.getElementById('status-message').innerText = "";

            setTimeout(function() {
                document.getElementById('loading-section').classList.add('hidden');
                document.getElementById('status-message').innerText = "Всі картки вже ізрасходувалися! 🦫 Почекайте до наступного завозу бобрів.";
            }, 10000);
        }
    </script>
</body>
</html>
