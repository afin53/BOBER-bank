<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Bober-Bank: Бобровий Капіталізм</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1e1e24; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { background: #2a2a35; padding: 20px; border-radius: 10px; width: 320px; margin-top: 50px; text-align: center; }
        .hidden { display: none !important; }
        button { background: #ff9f1c; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .bass-mode { animation: shake 0.2s infinite; }
        @keyframes shake { 0%{transform:translate(1px, 1px)} 50%{transform:translate(-1px, -1px)} }
    </style>
</head>
<body>

    <header><h1>🦫 BOBER-BANK</h1></header>

    <div id="auth-sec" class="container">
        <h2>Реєстрація / Вхід</h2>
        <input type="text" id="reg-login" placeholder="Логін">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="handleAuth('reg')">Зареєструватися</button>
        <button onclick="handleAuth('login')">Увійти</button>
    </div>

    <div id="nav-menu" class="nav hidden">
        <button onclick="showSec('balance-sec')">💰 Баланс</button>
        <button onclick="showSec('card-sec')">💳 Картка</button>
        <button onclick="showSec('job-sec')">🔨 Клікер</button>
        <button onclick="showSec('chat-sec')">💬 Чат</button>
        <button onclick="showSec('shop-sec')">🛒 Магазин</button>
        <button onclick="showSec('casino-sec')">🎰 Казік</button>
    </div>

    <div id="balance-sec" class="container hidden bank-sec"><h2>Баланс: <span id="bal">0</span> $</h2></div>
    <div id="card-sec" class="container hidden bank-sec">
        <h2>VIP-Картка</h2>
        <button id="card-btn" onclick="orderCard()">Замовити</button>
        <p id="card-msg"></p>
    </div>
    <div id="job-sec" class="container hidden bank-sec">
        <h2>Лісоповал</h2>
        <button onclick="clickJob()">Рубати ($0.10)</button>
    </div>
    <div id="chat-sec" class="container hidden bank-sec">
        <h2>Бобро-Чат</h2>
        <div id="chat-win" style="height:150px; overflow-y:scroll; background:#000;"></div>
        <input id="chat-msg" placeholder="Текст...">
        <button onclick="sendChat()">Надіслати</button>
    </div>
    <div id="shop-sec" class="container hidden bank-sec"><h2>🛒 Магазин (Бас-режим)</h2><audio id="shop-audio" loop src="music.mp4"></audio></div>
    <div id="casino-sec" class="container hidden bank-sec"><h2>🎰 Казік</h2><button onclick="playCasino()">Крутити</button></div>

    <script>
        // Ініціалізація
        const SUPABASE_URL = "https://nvwkbgknvxfxvnhkcxnd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_csnhsX6JOzkZqKwFePoXiw_2ZqGbn6m";
        const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentGlobalUser = "";

        async function handleAuth(type) {
            currentGlobalUser = document.getElementById('reg-login').value;
            const pass = document.getElementById('reg-pass').value;
            // Тут твоя логіка Supabase Auth
            alert("Вітаємо в Бобер-Банку, " + currentGlobalUser);
            document.getElementById('auth-sec').classList.add('hidden');
            document.getElementById('nav-menu').classList.remove('hidden');
        }

        function showSec(id) {
            document.querySelectorAll('.bank-sec').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            
            if(id === 'shop-sec') {
                document.getElementById('shop-audio').play();
                document.body.classList.add('bass-mode');
            } else {
                document.getElementById('shop-audio').pause();
                document.body.classList.remove('bass-mode');
            }
        }

        async function orderCard() {
            document.getElementById('card-btn').disabled = true;
            document.getElementById('card-msg').innerText = "Обробка 10 сек...";
            setTimeout(() => {
                document.getElementById('card-msg').innerText = "На жаль, картки закінчилися! Бобри все з'їли.";
                document.getElementById('card-btn').disabled = false;
            }, 10000);
        }

        async function sendChat() {
            const msg = document.getElementById('chat-msg').value;
            await mySupabase.from('bober_chat').insert([{ login: currentGlobalUser, message: msg }]);
            document.getElementById('chat-msg').value = '';
        }
    </script>
</body>
</html>
